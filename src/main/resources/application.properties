spring.application.name=demo

spring.datasource.url=jdbc:mariadb://localhost:3306/analisis
spring.datasource.username=root
spring.datasource.password=atlasjazz
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Configuracion para soportar hasta 10 min de procesamiento en los controladores (600,000 milisegundos = 10 minutos)
spring.mvc.async.request-timeout=600000
server.tomcat.connection-timeout=600000

# Configuracion de tiempo limite para transacciones de base de datos en 600 segundos (10 minutos)
spring.transaction.default-timeout=600